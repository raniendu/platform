name: platform

services:
  caddy:
    image: caddy:2.8-alpine
    container_name: platform-caddy
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
      PREFECT_BASIC_AUTH_USER: ${PREFECT_BASIC_AUTH_USER}
      PREFECT_BASIC_AUTH_HASH: ${PREFECT_BASIC_AUTH_HASH}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - dotdev
      - prefect-server
      - airflow-webserver
    networks:
      - platform
    restart: unless-stopped

  dotdev:
    build:
      context: ../../apps/dotdev
      dockerfile: Dockerfile
    container_name: platform-dotdev
    networks:
      - platform
    restart: unless-stopped

  prefect-postgres:
    image: postgres:15-alpine
    container_name: platform-prefect-postgres
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: ${PREFECT_POSTGRES_PASSWORD}
      POSTGRES_DB: prefect
    volumes:
      - prefect-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect -d prefect"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - platform
    restart: unless-stopped

  prefect-server:
    build:
      context: ../../apps/prefect
      dockerfile: Dockerfile
    container_name: platform-prefect-server
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:${PREFECT_POSTGRES_PASSWORD}@prefect-postgres:5432/prefect
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_SERVER_API_PORT: 4200
      PREFECT_UI_URL: https://prefect.raniendu.dev
      PREFECT_API_URL: https://prefect.raniendu.dev/api
      ENVIRONMENT: production
    depends_on:
      prefect-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - platform
    restart: unless-stopped

  prefect-worker:
    build:
      context: ../../apps/prefect
      dockerfile: Dockerfile
    container_name: platform-prefect-worker
    command: /bin/bash /app/docker/prefect/start-worker.sh
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      WORK_POOL_NAME: ${PREFECT_WORK_POOL_NAME:-default-pool}
      WORK_POOL_TYPE: ${PREFECT_WORK_POOL_TYPE:-process}
      PUSHOVER_APP_TOKEN: ${PUSHOVER_APP_TOKEN}
      PUSHOVER_USER_KEY: ${PUSHOVER_USER_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ENVIRONMENT: production
    depends_on:
      prefect-server:
        condition: service_healthy
    networks:
      - platform
    restart: unless-stopped

  airflow-postgres:
    image: postgres:15-alpine
    container_name: platform-airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD}
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - platform
    restart: unless-stopped

  airflow-init:
    build:
      context: ../../apps/flow
      dockerfile: Dockerfile
    container_name: platform-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -euo pipefail
        airflow_uid="$${AIRFLOW_UID:-50000}"
        mkdir -p /opt/airflow/logs /opt/airflow/plugins /opt/airflow/config
        chown -R "$${airflow_uid}:0" /opt/airflow/logs /opt/airflow/plugins /opt/airflow/config
        chmod -R g+rwX /opt/airflow/logs /opt/airflow/plugins /opt/airflow/config
        python -c 'import json, os; path = "/opt/airflow/config/passwords.json"; open(path, "w").write(json.dumps({os.environ["AIRFLOW_ADMIN_USER"]: os.environ["AIRFLOW_ADMIN_PASSWORD"]}) + "\n")'
        chown "$${airflow_uid}:0" /opt/airflow/config/passwords.json
        chmod 660 /opt/airflow/config/passwords.json
        su airflow -s /bin/bash -c 'airflow db migrate'
    environment: &airflow-prod-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_POSTGRES_PASSWORD}@airflow-postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: ${AIRFLOW_ADMIN_USER}:admin
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/config/passwords.json
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    volumes: &airflow-prod-volumes
      - ../../apps/flow/dags:/opt/airflow/dags:ro
      - airflow-logs:/opt/airflow/logs
      - airflow-plugins:/opt/airflow/plugins
      - airflow-config:/opt/airflow/config
    depends_on:
      airflow-postgres:
        condition: service_healthy
    user: "0:0"
    networks:
      - platform

  airflow-webserver:
    build:
      context: ../../apps/flow
      dockerfile: Dockerfile
    container_name: platform-airflow-webserver
    command: api-server
    environment: *airflow-prod-env
    volumes: *airflow-prod-volumes
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 45s
    user: "${AIRFLOW_UID:-50000}:0"
    networks:
      - platform
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: ../../apps/flow
      dockerfile: Dockerfile
    container_name: platform-airflow-scheduler
    command: scheduler
    environment: *airflow-prod-env
    volumes: *airflow-prod-volumes
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 45s
    user: "${AIRFLOW_UID:-50000}:0"
    networks:
      - platform
    restart: unless-stopped

networks:
  platform:
    name: platform-prod
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
  prefect-postgres-data:
  airflow-postgres-data:
  airflow-logs:
  airflow-plugins:
  airflow-config:
