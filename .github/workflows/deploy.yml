name: Deploy

on:
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to shared Droplet
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Open SSH firewall for runner
        env:
          PLATFORM_FIREWALL_ID: ${{ vars.PLATFORM_FIREWALL_ID }}
        run: |
          test -n "$PLATFORM_FIREWALL_ID"
          runner_ip="$(curl -fsS https://api.ipify.org)"
          runner_cidr="${runner_ip}/32"
          echo "RUNNER_SSH_CIDR=${runner_cidr}" >> "$GITHUB_ENV"

          doctl compute firewall remove-rules "$PLATFORM_FIREWALL_ID" \
            --inbound-rules "protocol:tcp,ports:22,address:${runner_cidr}" >/dev/null 2>&1 || true
          doctl compute firewall add-rules "$PLATFORM_FIREWALL_ID" \
            --inbound-rules "protocol:tcp,ports:22,address:${runner_cidr}"

      - name: Configure SSH
        env:
          PLATFORM_SSH_PRIVATE_KEY: ${{ secrets.PLATFORM_SSH_PRIVATE_KEY }}
          PLATFORM_SSH_HOST: ${{ secrets.PLATFORM_SSH_HOST }}
          PLATFORM_SSH_PORT: ${{ secrets.PLATFORM_SSH_PORT }}
        run: |
          test -n "$PLATFORM_SSH_PRIVATE_KEY"
          test -n "$PLATFORM_SSH_HOST"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PLATFORM_SSH_PRIVATE_KEY" > ~/.ssh/platform_key
          chmod 600 ~/.ssh/platform_key
          ssh-keyscan -p "${PLATFORM_SSH_PORT:-22}" "$PLATFORM_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload repository
        env:
          PLATFORM_SSH_HOST: ${{ secrets.PLATFORM_SSH_HOST }}
          PLATFORM_SSH_PORT: ${{ secrets.PLATFORM_SSH_PORT }}
          PLATFORM_SSH_USER: ${{ secrets.PLATFORM_SSH_USER }}
        run: |
          ssh_port="${PLATFORM_SSH_PORT:-22}"
          ssh_user="${PLATFORM_SSH_USER:-root}"
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.env*' \
            --exclude '**/.venv/' \
            --exclude '**/.pytest_cache/' \
            --exclude '**/__pycache__/' \
            -e "ssh -i ~/.ssh/platform_key -p ${ssh_port}" \
            ./ "${ssh_user}@${PLATFORM_SSH_HOST}:/opt/platform/"

      - name: Upload production environment
        env:
          PLATFORM_ENV_FILE: ${{ secrets.PLATFORM_ENV_FILE }}
          PLATFORM_SSH_HOST: ${{ secrets.PLATFORM_SSH_HOST }}
          PLATFORM_SSH_PORT: ${{ secrets.PLATFORM_SSH_PORT }}
          PLATFORM_SSH_USER: ${{ secrets.PLATFORM_SSH_USER }}
        run: |
          test -n "$PLATFORM_ENV_FILE"
          ssh_port="${PLATFORM_SSH_PORT:-22}"
          ssh_user="${PLATFORM_SSH_USER:-root}"
          printf '%s\n' "$PLATFORM_ENV_FILE" | ssh -i ~/.ssh/platform_key -p "${ssh_port}" \
            "${ssh_user}@${PLATFORM_SSH_HOST}" \
            "cat > /opt/platform/.env.production && chmod 600 /opt/platform/.env.production"

      - name: Start production Compose
        env:
          PLATFORM_SSH_HOST: ${{ secrets.PLATFORM_SSH_HOST }}
          PLATFORM_SSH_PORT: ${{ secrets.PLATFORM_SSH_PORT }}
          PLATFORM_SSH_USER: ${{ secrets.PLATFORM_SSH_USER }}
        run: |
          ssh_port="${PLATFORM_SSH_PORT:-22}"
          ssh_user="${PLATFORM_SSH_USER:-root}"
          ssh -i ~/.ssh/platform_key -p "${ssh_port}" "${ssh_user}@${PLATFORM_SSH_HOST}" \
            "cd /opt/platform && docker compose -f deploy/compose/docker-compose.prod.yml --env-file .env.production up -d --build"

      - name: Recreate Caddy
        env:
          PLATFORM_SSH_HOST: ${{ secrets.PLATFORM_SSH_HOST }}
          PLATFORM_SSH_PORT: ${{ secrets.PLATFORM_SSH_PORT }}
          PLATFORM_SSH_USER: ${{ secrets.PLATFORM_SSH_USER }}
        run: |
          ssh_port="${PLATFORM_SSH_PORT:-22}"
          ssh_user="${PLATFORM_SSH_USER:-root}"
          ssh -i ~/.ssh/platform_key -p "${ssh_port}" "${ssh_user}@${PLATFORM_SSH_HOST}" \
            "cd /opt/platform && docker compose -f deploy/compose/docker-compose.prod.yml --env-file .env.production up -d --no-deps --force-recreate caddy"

      - name: Smoke test public endpoints
        run: |
          dotdev_status="$(curl -sS -o /dev/null -w '%{http_code}' https://raniendu.dev/)"
          www_status="$(curl -sS -o /dev/null -w '%{http_code}' https://www.raniendu.dev/)"
          prefect_status="$(curl -sS -o /dev/null -w '%{http_code}' https://prefect.raniendu.dev/api/health)"
          airflow_status="$(curl -sS -o /dev/null -w '%{http_code}' https://flow.raniendu.dev/)"

          echo "raniendu.dev -> ${dotdev_status}"
          echo "www.raniendu.dev -> ${www_status}"
          echo "prefect.raniendu.dev/api/health -> ${prefect_status}"
          echo "flow.raniendu.dev -> ${airflow_status}"

          test "$dotdev_status" = "200"
          test "$www_status" = "301"
          test "$prefect_status" = "401"
          test "$airflow_status" = "200"

      - name: Close SSH firewall for runner
        if: always()
        env:
          PLATFORM_FIREWALL_ID: ${{ vars.PLATFORM_FIREWALL_ID }}
        run: |
          if [ -z "${PLATFORM_FIREWALL_ID:-}" ] || [ -z "${RUNNER_SSH_CIDR:-}" ]; then
            echo "No temporary SSH firewall rule recorded; skipping cleanup."
            exit 0
          fi

          doctl compute firewall remove-rules "$PLATFORM_FIREWALL_ID" \
            --inbound-rules "protocol:tcp,ports:22,address:${RUNNER_SSH_CIDR}" || true
