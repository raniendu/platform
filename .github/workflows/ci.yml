name: CI

on:
  pull_request:
  push:
    branches:
      - "**"

jobs:
  python:
    name: Python app (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: DotDev
            app: dotdev
            project: apps/dotdev
            python-version: "3.13"
          - name: Prefect
            app: prefect
            project: apps/prefect
            python-version: "3.10"
          - name: Flow
            app: flow
            project: apps/flow
            python-version: "3.10"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            ${{ matrix.project }}/pyproject.toml
            ${{ matrix.project }}/uv.lock

      - name: Install Python
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --project ${{ matrix.project }} --locked

      - name: Test DotDev
        if: matrix.app == 'dotdev'
        run: uv run --project apps/dotdev --locked pytest apps/dotdev/tests -q

      - name: Test Prefect properties
        if: matrix.app == 'prefect'
        run: uv run --project apps/prefect --locked pytest apps/prefect/tests/property/

      - name: Validate Airflow DAGs
        if: matrix.app == 'flow'
        run: uv run --project apps/flow --locked python apps/flow/scripts/validate-dags.py

      - name: Test Flow
        if: matrix.app == 'flow'
        run: uv run --project apps/flow --locked pytest apps/flow/tests/

  compose:
    name: Compose config
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Prepare CI env file
        run: cp .env.example .env.ci

      - name: Load production app flags
        id: app_flags
        run: bash deploy/scripts/prod-app-flags.sh github-outputs deploy/apps.prod.env >> "$GITHUB_OUTPUT"

      - name: Validate local Compose
        run: docker compose -f deploy/compose/docker-compose.local.yml --env-file .env.ci config

      - name: Render production Caddy routes
        run: bash deploy/scripts/render-prod-caddy.sh deploy/apps.prod.env deploy/caddy/prod-sites

      - name: Validate production Compose
        run: RAMAN_IMAGE=ghcr.io/raniendu/raman:ci COMPOSE_PROFILES="${{ steps.app_flags.outputs.compose_profiles }}" docker compose -f deploy/compose/docker-compose.prod.yml --env-file .env.ci config

  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Check Terraform formatting
        run: terraform fmt -check infra/terraform

      - name: Initialize Terraform
        run: terraform -chdir=infra/terraform init -backend=false -input=false

      - name: Validate Terraform
        run: terraform -chdir=infra/terraform validate
