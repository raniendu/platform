# Deprecated app-local example. Vikram is no longer wired into the shared
# platform Compose, Caddy, CI, or production deploy paths.
name: vikram-local

services:
  vikram:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/raniendu/platform/vikram:local
    container_name: vikram
    environment:
      VIKRAM_MODEL: ${VIKRAM_MODEL:-gemini-flash-latest}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      VIKRAM_AGENT: ${VIKRAM_AGENT:-vikram}
      VIKRAM_PARALLEL_API_KEY: ${VIKRAM_PARALLEL_API_KEY:-}
      PARALLEL_API_KEY: ${PARALLEL_API_KEY:-}
      VIKRAM_TELEGRAM_BOT_TOKEN: ${VIKRAM_TELEGRAM_BOT_TOKEN:-}
      VIKRAM_TELEGRAM_WEBHOOK_SECRET: ${VIKRAM_TELEGRAM_WEBHOOK_SECRET:-}
      VIKRAM_TELEGRAM_ALLOWED_CHAT_IDS: ${VIKRAM_TELEGRAM_ALLOWED_CHAT_IDS:-}
    volumes:
      - vikram-state:/app/.vikram
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  vikram-state:
