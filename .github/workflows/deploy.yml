name: Deploy

on:
  workflow_dispatch:
    inputs:
      allow_migration_staging_host:
        description: Allow deploy while platform-shared-small exists for migration recovery.
        required: false
        type: boolean
        default: false

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  IMAGE_PREFIX: ghcr.io/raniendu/platform
  TF_WORKING_DIR: infra/terraform

jobs:
  build-images:
    name: Build and push production images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    outputs:
      deploy_dotdev: ${{ steps.app_flags.outputs.deploy_dotdev }}
      deploy_prefect: ${{ steps.app_flags.outputs.deploy_prefect }}
      deploy_flow: ${{ steps.app_flags.outputs.deploy_flow }}
      deploy_paperclip: ${{ steps.app_flags.outputs.deploy_paperclip }}
      compose_profiles: ${{ steps.app_flags.outputs.compose_profiles }}
      enabled_pull_services: ${{ steps.app_flags.outputs.enabled_pull_services }}
      disabled_services: ${{ steps.app_flags.outputs.disabled_services }}
      disabled_containers: ${{ steps.app_flags.outputs.disabled_containers }}
      dotdev_image: ${{ steps.image_refs.outputs.dotdev_image }}
      prefect_image: ${{ steps.image_refs.outputs.prefect_image }}
      airflow_image: ${{ steps.image_refs.outputs.airflow_image }}
      paperclip_image: ${{ steps.image_refs.outputs.paperclip_image }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Load production app flags
        id: app_flags
        run: bash deploy/scripts/prod-app-flags.sh github-outputs deploy/apps.prod.env >> "$GITHUB_OUTPUT"

      - name: Set image refs
        id: image_refs
        run: |
          echo "dotdev_image=${IMAGE_PREFIX}/dotdev:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "prefect_image=${IMAGE_PREFIX}/prefect:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "airflow_image=${IMAGE_PREFIX}/airflow:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "paperclip_image=${IMAGE_PREFIX}/paperclip:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push DotDev image
        if: steps.app_flags.outputs.deploy_dotdev == 'true'
        uses: docker/build-push-action@v6
        with:
          context: apps/dotdev
          file: apps/dotdev/Dockerfile
          push: true
          tags: ${{ steps.image_refs.outputs.dotdev_image }}
          cache-from: type=gha,scope=dotdev
          cache-to: type=gha,mode=max,scope=dotdev

      - name: Build and push Prefect image
        if: steps.app_flags.outputs.deploy_prefect == 'true'
        uses: docker/build-push-action@v6
        with:
          context: apps/prefect
          file: apps/prefect/Dockerfile
          push: true
          tags: ${{ steps.image_refs.outputs.prefect_image }}
          cache-from: type=gha,scope=prefect
          cache-to: type=gha,mode=max,scope=prefect

      - name: Build and push Airflow image
        if: steps.app_flags.outputs.deploy_flow == 'true'
        uses: docker/build-push-action@v6
        with:
          context: apps/flow
          file: apps/flow/Dockerfile
          push: true
          tags: ${{ steps.image_refs.outputs.airflow_image }}
          cache-from: type=gha,scope=airflow
          cache-to: type=gha,mode=max,scope=airflow

      - name: Build and push Paperclip image
        if: steps.app_flags.outputs.deploy_paperclip == 'true'
        uses: docker/build-push-action@v6
        with:
          context: apps/paperclip
          file: apps/paperclip/Dockerfile
          push: true
          tags: ${{ steps.image_refs.outputs.paperclip_image }}
          cache-from: type=gha,scope=paperclip
          cache-to: type=gha,mode=max,scope=paperclip

  deploy:
    name: Deploy to shared Droplet
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    permissions:
      contents: read
      packages: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Set up doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Validate Terraform variables
        env:
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          TF_VAR_ssh_key_fingerprints: ${{ vars.DO_SSH_KEY_FINGERPRINTS || secrets.DO_SSH_KEY_FINGERPRINTS }}
          TF_VAR_allowed_ssh_cidrs: ${{ vars.ALLOWED_SSH_CIDRS || secrets.ALLOWED_SSH_CIDRS || '[]' }}
        run: |
          test -n "$TF_VAR_do_token"
          test -n "$TF_VAR_ssh_key_fingerprints"
          case "$TF_VAR_ssh_key_fingerprints" in
            \[*\]) ;;
            *)
              echo "::error::DO_SSH_KEY_FINGERPRINTS must be a Terraform list, for example [\"aa:bb:cc\"]"
              exit 1
              ;;
          esac
          case "$TF_VAR_allowed_ssh_cidrs" in
            \[*\]) ;;
            *)
              echo "::error::ALLOWED_SSH_CIDRS must be a Terraform list, for example [\"203.0.113.10/32\"] or []"
              exit 1
              ;;
          esac

      - name: Initialize Terraform
        env:
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          TF_VAR_ssh_key_fingerprints: ${{ vars.DO_SSH_KEY_FINGERPRINTS || secrets.DO_SSH_KEY_FINGERPRINTS }}
          TF_VAR_allowed_ssh_cidrs: ${{ vars.ALLOWED_SSH_CIDRS || secrets.ALLOWED_SSH_CIDRS || '[]' }}
        run: terraform -chdir="$TF_WORKING_DIR" init -input=false

      - name: Adopt existing DigitalOcean resources
        id: adopt
        env:
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          TF_VAR_ssh_key_fingerprints: ${{ vars.DO_SSH_KEY_FINGERPRINTS || secrets.DO_SSH_KEY_FINGERPRINTS }}
          TF_VAR_allowed_ssh_cidrs: ${{ vars.ALLOWED_SSH_CIDRS || secrets.ALLOWED_SSH_CIDRS || '[]' }}
          DROPLET_NAME: platform-shared
          MIGRATION_DROPLET_NAME: platform-shared-small
          ALLOW_MIGRATION_STAGING_HOST: ${{ inputs.allow_migration_staging_host && 'true' || 'false' }}
        run: |
          set -euo pipefail

          get_ids_by_name() {
            resource="$1"
            name="$2"

            case "$resource" in
              droplet)
                doctl compute droplet list --format ID,Name --no-header |
                  awk -v expected="$name" '$2 == expected {print $1}'
                ;;
              firewall)
                doctl compute firewall list --format ID,Name --no-header |
                  awk -v expected="$name" '$2 == expected {print $1}'
                ;;
              *)
                echo "::error::Unsupported resource type: $resource"
                exit 1
                ;;
            esac
          }

          import_if_needed() {
            address="$1"
            id="$2"

            if terraform -chdir="$TF_WORKING_DIR" state show "$address" >/dev/null 2>&1; then
              state_id="$(terraform -chdir="$TF_WORKING_DIR" state show -no-color "$address" | awk -F' = ' '$1 ~ /^ *id$/ {print $2; exit}')"
              if [ "$state_id" != "$id" ]; then
                echo "::error::Terraform state has $address id $state_id, but DigitalOcean has $id"
                exit 1
              fi
              return 0
            fi

            terraform -chdir="$TF_WORKING_DIR" import -input=false "$address" "$id"
          }

          firewall_name="${DROPLET_NAME}-firewall"
          droplet_ids_file="$(mktemp)"
          migration_droplet_ids_file="$(mktemp)"
          firewall_ids_file="$(mktemp)"
          trap 'rm -f "$droplet_ids_file" "$migration_droplet_ids_file" "$firewall_ids_file"' EXIT

          get_ids_by_name droplet "$DROPLET_NAME" > "$droplet_ids_file"
          get_ids_by_name droplet "$MIGRATION_DROPLET_NAME" > "$migration_droplet_ids_file"
          get_ids_by_name firewall "$firewall_name" > "$firewall_ids_file"
          mapfile -t droplet_ids < "$droplet_ids_file"
          mapfile -t migration_droplet_ids < "$migration_droplet_ids_file"
          mapfile -t firewall_ids < "$firewall_ids_file"

          if [ "${#migration_droplet_ids[@]}" -gt 1 ]; then
            echo "::error::Found multiple smaller-Droplet migration hosts named ${MIGRATION_DROPLET_NAME}; refusing deploy."
            printf '%s\n' "${migration_droplet_ids[@]}"
            exit 1
          fi

          if [ "${#migration_droplet_ids[@]}" -eq 1 ] && [ "$ALLOW_MIGRATION_STAGING_HOST" != "true" ]; then
            echo "::error::Found smaller-Droplet migration host ${MIGRATION_DROPLET_NAME}; refusing routine deploy until migration promote or rollback completes."
            printf '%s\n' "${migration_droplet_ids[@]}"
            exit 1
          fi

          if [ "${#migration_droplet_ids[@]}" -eq 1 ]; then
            echo "::warning::Found ${MIGRATION_DROPLET_NAME}; continuing because allow_migration_staging_host=true."
          fi

          if [ "${#droplet_ids[@]}" -gt 1 ]; then
            echo "::error::Found multiple DigitalOcean Droplets named ${DROPLET_NAME}; refusing to apply."
            printf '%s\n' "${droplet_ids[@]}"
            exit 1
          fi

          if [ "${#firewall_ids[@]}" -gt 1 ]; then
            echo "::error::Found multiple DigitalOcean Firewalls named ${firewall_name}; refusing to apply."
            printf '%s\n' "${firewall_ids[@]}"
            exit 1
          fi

          existing_droplet_id=""
          if [ "${#droplet_ids[@]}" -eq 1 ]; then
            existing_droplet_id="${droplet_ids[0]}"
            import_if_needed digitalocean_droplet.platform "$existing_droplet_id"
          fi

          if [ "${#firewall_ids[@]}" -eq 1 ]; then
            import_if_needed digitalocean_firewall.platform "${firewall_ids[0]}"
          fi

          echo "existing_droplet_id=${existing_droplet_id}" >> "$GITHUB_OUTPUT"

      - name: Plan infrastructure
        env:
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          TF_VAR_ssh_key_fingerprints: ${{ vars.DO_SSH_KEY_FINGERPRINTS || secrets.DO_SSH_KEY_FINGERPRINTS }}
          TF_VAR_allowed_ssh_cidrs: ${{ vars.ALLOWED_SSH_CIDRS || secrets.ALLOWED_SSH_CIDRS || '[]' }}
        run: |
          set +e
          terraform -chdir="$TF_WORKING_DIR" plan -input=false -out=tfplan -detailed-exitcode
          exit_code="$?"
          set -e

          if [ "$exit_code" -eq 1 ]; then
            exit 1
          fi

          terraform -chdir="$TF_WORKING_DIR" show -json tfplan > "$TF_WORKING_DIR/tfplan.json"

      - name: Guard against duplicate Droplet creation
        env:
          EXISTING_DROPLET_ID: ${{ steps.adopt.outputs.existing_droplet_id }}
        run: |
          set -euo pipefail

          droplet_create_count="$(jq '[.resource_changes[]? | select(.type == "digitalocean_droplet") | select(.change.actions | index("create"))] | length' "$TF_WORKING_DIR/tfplan.json")"
          droplet_delete_count="$(jq '[.resource_changes[]? | select(.type == "digitalocean_droplet") | select(.change.actions | index("delete"))] | length' "$TF_WORKING_DIR/tfplan.json")"

          if [ "$droplet_delete_count" != "0" ]; then
            echo "::error::Terraform plan would delete or replace a Droplet; refusing to apply."
            jq -r '.resource_changes[]? | select(.type == "digitalocean_droplet") | "\(.address): \(.change.actions | join(","))"' "$TF_WORKING_DIR/tfplan.json"
            exit 1
          fi

          if [ -n "$EXISTING_DROPLET_ID" ] && [ "$droplet_create_count" != "0" ]; then
            echo "::error::Droplet ${EXISTING_DROPLET_ID} already exists, but Terraform would create another Droplet; refusing to apply."
            jq -r '.resource_changes[]? | select(.type == "digitalocean_droplet") | "\(.address): \(.change.actions | join(","))"' "$TF_WORKING_DIR/tfplan.json"
            exit 1
          fi

          if [ -z "$EXISTING_DROPLET_ID" ] && [ "$droplet_create_count" -gt 1 ]; then
            echo "::error::Terraform would create more than one Droplet; refusing to apply."
            jq -r '.resource_changes[]? | select(.type == "digitalocean_droplet") | "\(.address): \(.change.actions | join(","))"' "$TF_WORKING_DIR/tfplan.json"
            exit 1
          fi

      - name: Apply infrastructure
        env:
          TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          TF_VAR_ssh_key_fingerprints: ${{ vars.DO_SSH_KEY_FINGERPRINTS || secrets.DO_SSH_KEY_FINGERPRINTS }}
          TF_VAR_allowed_ssh_cidrs: ${{ vars.ALLOWED_SSH_CIDRS || secrets.ALLOWED_SSH_CIDRS || '[]' }}
        run: terraform -chdir="$TF_WORKING_DIR" apply -input=false -auto-approve tfplan

      - name: Export infrastructure outputs
        run: |
          droplet_ip="$(terraform -chdir="$TF_WORKING_DIR" output -raw droplet_ip)"
          firewall_id="$(terraform -chdir="$TF_WORKING_DIR" output -raw firewall_id)"

          test -n "$droplet_ip"
          test -n "$firewall_id"

          echo "PLATFORM_SSH_HOST=${droplet_ip}" >> "$GITHUB_ENV"
          echo "PLATFORM_FIREWALL_ID=${firewall_id}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Open SSH firewall for runner
        env:
          PLATFORM_SSH_PORT: ${{ secrets.PLATFORM_SSH_PORT }}
        run: |
          test -n "$PLATFORM_FIREWALL_ID"
          ssh_port="${PLATFORM_SSH_PORT:-22}"
          runner_ip="$(curl -fsS https://api.ipify.org)"
          runner_cidr="${runner_ip}/32"
          echo "RUNNER_SSH_CIDR=${runner_cidr}" >> "$GITHUB_ENV"

          doctl compute firewall remove-rules "$PLATFORM_FIREWALL_ID" \
            --inbound-rules "protocol:tcp,ports:${ssh_port},address:${runner_cidr}" >/dev/null 2>&1 || true
          doctl compute firewall add-rules "$PLATFORM_FIREWALL_ID" \
            --inbound-rules "protocol:tcp,ports:${ssh_port},address:${runner_cidr}"

      - name: Configure SSH
        env:
          PLATFORM_SSH_PRIVATE_KEY: ${{ secrets.PLATFORM_SSH_PRIVATE_KEY }}
          PLATFORM_SSH_PORT: ${{ secrets.PLATFORM_SSH_PORT }}
        run: |
          test -n "$PLATFORM_SSH_PRIVATE_KEY"
          test -n "$PLATFORM_SSH_HOST"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PLATFORM_SSH_PRIVATE_KEY" > ~/.ssh/platform_key
          chmod 600 ~/.ssh/platform_key
          for attempt in $(seq 1 30); do
            if ssh-keyscan -p "${PLATFORM_SSH_PORT:-22}" "$PLATFORM_SSH_HOST" >> ~/.ssh/known_hosts; then
              exit 0
            fi
            echo "Waiting for SSH host key, attempt ${attempt}"
            sleep 10
          done
          echo "::error::SSH host key scan failed for ${PLATFORM_SSH_HOST}"
          exit 1

      - name: Wait for host bootstrap
        env:
          PLATFORM_SSH_PORT: ${{ secrets.PLATFORM_SSH_PORT }}
          PLATFORM_SSH_USER: ${{ secrets.PLATFORM_SSH_USER }}
        run: |
          ssh_port="${PLATFORM_SSH_PORT:-22}"
          ssh_user="${PLATFORM_SSH_USER:-root}"

          for attempt in $(seq 1 30); do
            if ssh -i ~/.ssh/platform_key -p "${ssh_port}" \
              -o ConnectTimeout=10 \
              -o StrictHostKeyChecking=yes \
              "${ssh_user}@${PLATFORM_SSH_HOST}" \
              "cloud-init status --wait >/dev/null 2>&1 || true; docker version >/dev/null 2>&1 && test -d /opt/platform"; then
              exit 0
            fi
            echo "Waiting for Droplet bootstrap, attempt ${attempt}"
            sleep 10
          done

          echo "::error::Droplet bootstrap did not finish in time."
          exit 1

      - name: Upload repository
        env:
          PLATFORM_SSH_PORT: ${{ secrets.PLATFORM_SSH_PORT }}
          PLATFORM_SSH_USER: ${{ secrets.PLATFORM_SSH_USER }}
        run: |
          ssh_port="${PLATFORM_SSH_PORT:-22}"
          ssh_user="${PLATFORM_SSH_USER:-root}"
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.env*' \
            --exclude '**/.venv/' \
            --exclude '**/.pytest_cache/' \
            --exclude '**/__pycache__/' \
            -e "ssh -i ~/.ssh/platform_key -p ${ssh_port}" \
            ./ "${ssh_user}@${PLATFORM_SSH_HOST}:/opt/platform/"

      - name: Upload production environment
        env:
          PLATFORM_ENV_FILE: ${{ secrets.PLATFORM_ENV_FILE }}
          PLATFORM_SSH_PORT: ${{ secrets.PLATFORM_SSH_PORT }}
          PLATFORM_SSH_USER: ${{ secrets.PLATFORM_SSH_USER }}
          DOTDEV_IMAGE: ${{ needs.build-images.outputs.dotdev_image }}
          PREFECT_IMAGE: ${{ needs.build-images.outputs.prefect_image }}
          AIRFLOW_IMAGE: ${{ needs.build-images.outputs.airflow_image }}
          PAPERCLIP_IMAGE: ${{ needs.build-images.outputs.paperclip_image }}
          DEPLOY_DOTDEV: ${{ needs.build-images.outputs.deploy_dotdev }}
          DEPLOY_PREFECT: ${{ needs.build-images.outputs.deploy_prefect }}
          DEPLOY_FLOW: ${{ needs.build-images.outputs.deploy_flow }}
          DEPLOY_PAPERCLIP: ${{ needs.build-images.outputs.deploy_paperclip }}
        run: |
          test -n "$PLATFORM_ENV_FILE"
          test -n "$DOTDEV_IMAGE"
          test -n "$PREFECT_IMAGE"
          test -n "$AIRFLOW_IMAGE"
          test -n "$PAPERCLIP_IMAGE"
          test -n "$DEPLOY_DOTDEV"
          test -n "$DEPLOY_PREFECT"
          test -n "$DEPLOY_FLOW"
          test -n "$DEPLOY_PAPERCLIP"
          require_env_key() {
            key="$1"
            if ! printf '%s\n' "$PLATFORM_ENV_FILE" | grep -Eq "^${key}="; then
              echo "::error::PLATFORM_ENV_FILE must include ${key}"
              exit 1
            fi
          }
          require_env_key PLATFORM_POSTGRES_PASSWORD
          require_env_key PREFECT_POSTGRES_PASSWORD
          require_env_key AIRFLOW_POSTGRES_PASSWORD
          require_env_key PAPERCLIP_POSTGRES_PASSWORD
          if [ "$DEPLOY_PREFECT" = true ]; then
            require_env_key PREFECT_BASIC_AUTH_USER
            require_env_key PREFECT_BASIC_AUTH_HASH
          fi
          if [ "$DEPLOY_FLOW" = true ]; then
            require_env_key AIRFLOW__CORE__FERNET_KEY
            require_env_key AIRFLOW__WEBSERVER__SECRET_KEY
            require_env_key AIRFLOW_ADMIN_USER
            require_env_key AIRFLOW_ADMIN_PASSWORD
          fi
          if [ "$DEPLOY_PAPERCLIP" = true ]; then
            require_env_key PAPERCLIP_BASIC_AUTH_USER
            require_env_key PAPERCLIP_BASIC_AUTH_HASH
            require_env_key PAPERCLIP_BETTER_AUTH_SECRET
            require_env_key PAPERCLIP_AGENT_JWT_SECRET
          fi
          ssh_port="${PLATFORM_SSH_PORT:-22}"
          ssh_user="${PLATFORM_SSH_USER:-root}"
          {
            printf '%s\n' "$PLATFORM_ENV_FILE"
            printf 'DEPLOY_DOTDEV=%s\n' "$DEPLOY_DOTDEV"
            printf 'DEPLOY_PREFECT=%s\n' "$DEPLOY_PREFECT"
            printf 'DEPLOY_FLOW=%s\n' "$DEPLOY_FLOW"
            printf 'DEPLOY_PAPERCLIP=%s\n' "$DEPLOY_PAPERCLIP"
            printf 'DOTDEV_IMAGE=%s\n' "$DOTDEV_IMAGE"
            printf 'PREFECT_IMAGE=%s\n' "$PREFECT_IMAGE"
            printf 'AIRFLOW_IMAGE=%s\n' "$AIRFLOW_IMAGE"
            printf 'PAPERCLIP_IMAGE=%s\n' "$PAPERCLIP_IMAGE"
          } | ssh -i ~/.ssh/platform_key -p "${ssh_port}" \
            "${ssh_user}@${PLATFORM_SSH_HOST}" \
            "cat > /opt/platform/.env.production && chmod 600 /opt/platform/.env.production"

      - name: Upload GHCR credentials
        env:
          PLATFORM_SSH_PORT: ${{ secrets.PLATFORM_SSH_PORT }}
          PLATFORM_SSH_USER: ${{ secrets.PLATFORM_SSH_USER }}
        run: |
          ssh_port="${PLATFORM_SSH_PORT:-22}"
          ssh_user="${PLATFORM_SSH_USER:-root}"
          remote_docker_config="/tmp/platform-ghcr-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "REMOTE_DOCKER_CONFIG=${remote_docker_config}" >> "$GITHUB_ENV"
          ssh -i ~/.ssh/platform_key -p "${ssh_port}" "${ssh_user}@${PLATFORM_SSH_HOST}" \
            "mkdir -p '${remote_docker_config}' && chmod 700 '${remote_docker_config}'"
          scp -i ~/.ssh/platform_key -P "${ssh_port}" ~/.docker/config.json \
            "${ssh_user}@${PLATFORM_SSH_HOST}:${remote_docker_config}/config.json"
          ssh -i ~/.ssh/platform_key -p "${ssh_port}" "${ssh_user}@${PLATFORM_SSH_HOST}" \
            "chmod 600 '${remote_docker_config}/config.json'"

      - name: Start production Compose
        env:
          PLATFORM_SSH_PORT: ${{ secrets.PLATFORM_SSH_PORT }}
          PLATFORM_SSH_USER: ${{ secrets.PLATFORM_SSH_USER }}
          COMPOSE_PROFILES: ${{ needs.build-images.outputs.compose_profiles }}
          ENABLED_PULL_SERVICES: ${{ needs.build-images.outputs.enabled_pull_services }}
          DISABLED_CONTAINERS: ${{ needs.build-images.outputs.disabled_containers }}
          DEPLOY_PAPERCLIP: ${{ needs.build-images.outputs.deploy_paperclip }}
        run: |
          ssh_port="${PLATFORM_SSH_PORT:-22}"
          ssh_user="${PLATFORM_SSH_USER:-root}"
          test -n "$REMOTE_DOCKER_CONFIG"
          test -n "$ENABLED_PULL_SERVICES"
          ssh -i ~/.ssh/platform_key -p "${ssh_port}" "${ssh_user}@${PLATFORM_SSH_HOST}" bash -se <<EOF
          cd /opt/platform
          trap 'rm -rf "${REMOTE_DOCKER_CONFIG}"' EXIT
          bash deploy/scripts/render-prod-caddy.sh deploy/apps.prod.env deploy/caddy/prod-sites
          if [ -n "${DISABLED_CONTAINERS}" ]; then
            docker rm -f ${DISABLED_CONTAINERS} >/dev/null 2>&1 || true
          fi
          COMPOSE_PROFILES="${COMPOSE_PROFILES}" docker --config "${REMOTE_DOCKER_CONFIG}" compose -f deploy/compose/docker-compose.prod.yml --env-file .env.production pull ${ENABLED_PULL_SERVICES}
          bash deploy/scripts/consolidate-postgres.sh deploy/compose/docker-compose.prod.yml .env.production
          if [ "${DEPLOY_PAPERCLIP}" = true ]; then
            if ! COMPOSE_PROFILES="${COMPOSE_PROFILES}" docker --config "${REMOTE_DOCKER_CONFIG}" compose -f deploy/compose/docker-compose.prod.yml --env-file .env.production up --no-build --force-recreate paperclip-db-init; then
              COMPOSE_PROFILES="${COMPOSE_PROFILES}" docker compose -f deploy/compose/docker-compose.prod.yml --env-file .env.production logs --tail 200 paperclip-db-init
              exit 1
            fi
          fi
          COMPOSE_PROFILES="${COMPOSE_PROFILES}" docker --config "${REMOTE_DOCKER_CONFIG}" compose -f deploy/compose/docker-compose.prod.yml --env-file .env.production up -d --no-build
          EOF

      - name: Recreate Caddy
        env:
          PLATFORM_SSH_PORT: ${{ secrets.PLATFORM_SSH_PORT }}
          PLATFORM_SSH_USER: ${{ secrets.PLATFORM_SSH_USER }}
          COMPOSE_PROFILES: ${{ needs.build-images.outputs.compose_profiles }}
        run: |
          ssh_port="${PLATFORM_SSH_PORT:-22}"
          ssh_user="${PLATFORM_SSH_USER:-root}"
          ssh -i ~/.ssh/platform_key -p "${ssh_port}" "${ssh_user}@${PLATFORM_SSH_HOST}" \
            "cd /opt/platform && COMPOSE_PROFILES='${COMPOSE_PROFILES}' docker compose -f deploy/compose/docker-compose.prod.yml --env-file .env.production up -d --no-build --no-deps --force-recreate caddy"

      - name: Smoke test public endpoints
        env:
          DEPLOY_DOTDEV: ${{ needs.build-images.outputs.deploy_dotdev }}
          DEPLOY_PREFECT: ${{ needs.build-images.outputs.deploy_prefect }}
          DEPLOY_FLOW: ${{ needs.build-images.outputs.deploy_flow }}
          DEPLOY_PAPERCLIP: ${{ needs.build-images.outputs.deploy_paperclip }}
        run: |
          check_status() {
            label="$1"
            url="$2"
            expected="$3"

            for attempt in $(seq 1 24); do
              status="$(curl -sS --connect-timeout 5 --max-time 15 -o /dev/null -w '%{http_code}' "$url" || true)"

              if [ "$status" = "$expected" ]; then
                echo "${label} -> ${status}"
                return 0
              fi

              echo "${label} attempt ${attempt} -> ${status:-curl failed}; expected ${expected}"
              sleep 5
            done

            echo "::error::${label} did not return ${expected}"
            return 1
          }

          if [ "$DEPLOY_DOTDEV" = true ]; then
            check_status "raniendu.dev" "https://raniendu.dev/" "200"
            check_status "www.raniendu.dev" "https://www.raniendu.dev/" "301"
          else
            check_status "raniendu.dev disabled" "https://raniendu.dev/" "404"
            check_status "www.raniendu.dev disabled" "https://www.raniendu.dev/" "404"
          fi

          if [ "$DEPLOY_PREFECT" = true ]; then
            check_status "prefect.raniendu.dev/api/health" "https://prefect.raniendu.dev/api/health" "401"
          else
            check_status "prefect.raniendu.dev disabled" "https://prefect.raniendu.dev/" "404"
          fi

          if [ "$DEPLOY_PAPERCLIP" = true ]; then
            check_status "paperclip.raniendu.dev" "https://paperclip.raniendu.dev/" "401"
          else
            check_status "paperclip.raniendu.dev disabled" "https://paperclip.raniendu.dev/" "404"
          fi

          if [ "$DEPLOY_FLOW" = true ]; then
            check_status "flow.raniendu.dev" "https://flow.raniendu.dev/" "200"
          else
            check_status "flow.raniendu.dev disabled" "https://flow.raniendu.dev/" "404"
          fi

      - name: Stop legacy Postgres containers after migration
        env:
          PLATFORM_SSH_PORT: ${{ secrets.PLATFORM_SSH_PORT }}
          PLATFORM_SSH_USER: ${{ secrets.PLATFORM_SSH_USER }}
        run: |
          ssh_port="${PLATFORM_SSH_PORT:-22}"
          ssh_user="${PLATFORM_SSH_USER:-root}"
          ssh -i ~/.ssh/platform_key -p "${ssh_port}" "${ssh_user}@${PLATFORM_SSH_HOST}" \
            "docker rm -f platform-prefect-postgres platform-airflow-postgres >/dev/null 2>&1 || true" || true

      - name: Remove remote GHCR credentials
        if: always()
        env:
          PLATFORM_SSH_PORT: ${{ secrets.PLATFORM_SSH_PORT }}
          PLATFORM_SSH_USER: ${{ secrets.PLATFORM_SSH_USER }}
        run: |
          if [ -z "${REMOTE_DOCKER_CONFIG:-}" ]; then
            echo "No remote GHCR credentials to remove."
            exit 0
          fi

          ssh_port="${PLATFORM_SSH_PORT:-22}"
          ssh_user="${PLATFORM_SSH_USER:-root}"
          ssh -i ~/.ssh/platform_key -p "${ssh_port}" "${ssh_user}@${PLATFORM_SSH_HOST}" \
            "rm -rf '${REMOTE_DOCKER_CONFIG}'" || true

      - name: Close SSH firewall for runner
        if: always()
        env:
          PLATFORM_SSH_PORT: ${{ secrets.PLATFORM_SSH_PORT }}
        run: |
          if [ -z "${PLATFORM_FIREWALL_ID:-}" ] || [ -z "${RUNNER_SSH_CIDR:-}" ]; then
            echo "No temporary SSH firewall rule recorded; skipping cleanup."
            exit 0
          fi

          ssh_port="${PLATFORM_SSH_PORT:-22}"

          doctl compute firewall remove-rules "$PLATFORM_FIREWALL_ID" \
            --inbound-rules "protocol:tcp,ports:${ssh_port},address:${RUNNER_SSH_CIDR}" || true
