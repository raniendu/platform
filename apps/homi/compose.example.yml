# Deprecated app-local example. Homi is no longer wired into the shared platform
# Compose, Caddy, CI, or production deploy paths.
name: homi-local

services:
  homi:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/raniendu/platform/homi:local
    container_name: homi
    environment:
      HOMI_MODEL_ID: ${HOMI_MODEL_ID:-us.anthropic.claude-sonnet-4-20250514-v1:0}
      HOMI_AWS_REGION: ${HOMI_AWS_REGION:-us-west-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_BEARER_TOKEN_BEDROCK: ${AWS_BEARER_TOKEN_BEDROCK:-}
      HOMI_AGENT: ${HOMI_AGENT:-homi}
      HOMI_PARALLEL_API_KEY: ${HOMI_PARALLEL_API_KEY:-}
      PARALLEL_API_KEY: ${PARALLEL_API_KEY:-}
      HOMI_TELEGRAM_BOT_TOKEN: ${HOMI_TELEGRAM_BOT_TOKEN:-}
      HOMI_TELEGRAM_WEBHOOK_SECRET: ${HOMI_TELEGRAM_WEBHOOK_SECRET:-}
      HOMI_TELEGRAM_ALLOWED_CHAT_IDS: ${HOMI_TELEGRAM_ALLOWED_CHAT_IDS:-}
    volumes:
      - homi-state:/app/.homi
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  homi-state:
