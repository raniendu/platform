name: platform

services:
  caddy:
    image: caddy:2.8-alpine
    container_name: platform-caddy
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
      PREFECT_BASIC_AUTH_USER: ${PREFECT_BASIC_AUTH_USER}
      PREFECT_BASIC_AUTH_HASH: ${PREFECT_BASIC_AUTH_HASH}
      PAPERCLIP_BASIC_AUTH_USER: ${PAPERCLIP_BASIC_AUTH_USER}
      PAPERCLIP_BASIC_AUTH_HASH: ${PAPERCLIP_BASIC_AUTH_HASH}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - ../caddy/prod-sites:/etc/caddy/sites:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - platform
    restart: unless-stopped

  dotdev:
    image: ${DOTDEV_IMAGE:?DOTDEV_IMAGE is required}
    container_name: platform-dotdev
    profiles: ["dotdev"]
    networks:
      - platform
    restart: unless-stopped

  raman:
    image: ${RAMAN_IMAGE:?RAMAN_IMAGE is required}
    container_name: platform-raman
    profiles: ["raman"]
    environment:
      RAMAN_MODEL_PROVIDER: ${RAMAN_MODEL_PROVIDER:-digitalocean}
      RAMAN_DEV_MODEL: ${RAMAN_DEV_MODEL:-llama3.3-70b-instruct}
      DO_INFERENCE_API_KEY: ${DO_INFERENCE_API_KEY:?DO_INFERENCE_API_KEY is required}
      RAMAN_AGENT: ${RAMAN_AGENT:-raman}
      RAMAN_PUBLIC_BASE_URL: ${RAMAN_PUBLIC_BASE_URL:-https://raman.raniendu.dev}
      PARALLEL_API_KEY: ${PARALLEL_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:?TELEGRAM_WEBHOOK_SECRET is required}
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS:?TELEGRAM_ALLOWED_CHAT_IDS is required}
      ENVIRONMENT: production
    volumes:
      - raman-state:/app/.raman
    networks:
      - platform
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: platform-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PLATFORM_POSTGRES_PASSWORD:?PLATFORM_POSTGRES_PASSWORD is required}
      POSTGRES_DB: postgres
      PREFECT_POSTGRES_PASSWORD: ${PREFECT_POSTGRES_PASSWORD:?PREFECT_POSTGRES_PASSWORD is required}
      AIRFLOW_POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD:?AIRFLOW_POSTGRES_PASSWORD is required}
      PAPERCLIP_POSTGRES_PASSWORD: ${PAPERCLIP_POSTGRES_PASSWORD:?PAPERCLIP_POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../postgres/init-platform-dbs.sh:/docker-entrypoint-initdb.d/10-platform-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres && pg_isready -U prefect -d prefect && pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - platform
    restart: unless-stopped

  prefect-server:
    image: ${PREFECT_IMAGE:?PREFECT_IMAGE is required}
    container_name: platform-prefect-server
    profiles: ["prefect"]
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:${PREFECT_POSTGRES_PASSWORD}@postgres:5432/prefect
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_SERVER_API_PORT: 4200
      PREFECT_UI_URL: https://prefect.raniendu.dev
      PREFECT_API_URL: https://prefect.raniendu.dev/api
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - platform
    restart: unless-stopped

  prefect-worker:
    image: ${PREFECT_IMAGE:?PREFECT_IMAGE is required}
    container_name: platform-prefect-worker
    profiles: ["prefect"]
    command: /bin/bash /app/docker/prefect/start-worker.sh
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      WORK_POOL_NAME: ${PREFECT_WORK_POOL_NAME:-default-pool}
      WORK_POOL_TYPE: ${PREFECT_WORK_POOL_TYPE:-process}
      PUSHOVER_APP_TOKEN: ${PUSHOVER_APP_TOKEN}
      PUSHOVER_USER_KEY: ${PUSHOVER_USER_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ENVIRONMENT: production
    depends_on:
      prefect-server:
        condition: service_healthy
    networks:
      - platform
    restart: unless-stopped

  paperclip-db-init:
    image: postgres:15-alpine
    container_name: platform-paperclip-db-init
    profiles: ["paperclip"]
    entrypoint: /bin/sh
    command: /scripts/ensure-paperclip-db.sh
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: ${PLATFORM_POSTGRES_PASSWORD:?PLATFORM_POSTGRES_PASSWORD is required}
      PAPERCLIP_POSTGRES_PASSWORD: ${PAPERCLIP_POSTGRES_PASSWORD:?PAPERCLIP_POSTGRES_PASSWORD is required}
    volumes:
      - ../postgres/ensure-paperclip-db.sh:/scripts/ensure-paperclip-db.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - platform

  paperclip:
    image: ${PAPERCLIP_IMAGE:?PAPERCLIP_IMAGE is required}
    container_name: platform-paperclip
    profiles: ["paperclip"]
    environment:
      HOST: 0.0.0.0
      PORT: 3100
      SERVE_UI: "true"
      PAPERCLIP_HOME: /paperclip
      PAPERCLIP_INSTANCE_ID: default
      PAPERCLIP_CONFIG: /etc/paperclip/config.json
      PAPERCLIP_DEPLOYMENT_MODE: authenticated
      PAPERCLIP_DEPLOYMENT_EXPOSURE: public
      PAPERCLIP_PUBLIC_URL: https://paperclip.raniendu.dev
      PAPERCLIP_AUTH_PUBLIC_BASE_URL: https://paperclip.raniendu.dev
      PAPERCLIP_AUTH_BASE_URL_MODE: explicit
      PAPERCLIP_ALLOWED_HOSTNAMES: paperclip.raniendu.dev
      PAPERCLIP_MIGRATION_AUTO_APPLY: "true"
      PAPERCLIP_TELEMETRY_DISABLED: "1"
      DO_NOT_TRACK: "1"
      DATABASE_URL: postgresql://paperclip:${PAPERCLIP_POSTGRES_PASSWORD}@postgres:5432/paperclip
      BETTER_AUTH_SECRET: ${PAPERCLIP_BETTER_AUTH_SECRET:?PAPERCLIP_BETTER_AUTH_SECRET is required}
      PAPERCLIP_AGENT_JWT_SECRET: ${PAPERCLIP_AGENT_JWT_SECRET:?PAPERCLIP_AGENT_JWT_SECRET is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - paperclip-data:/paperclip
      - ../paperclip/config.prod.json:/etc/paperclip/config.json:ro
    depends_on:
      paperclip-db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "--header", "Host: paperclip.raniendu.dev", "http://localhost:3100/api/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - platform
    restart: unless-stopped

  airflow-init:
    image: ${AIRFLOW_IMAGE:?AIRFLOW_IMAGE is required}
    container_name: platform-airflow-init
    profiles: ["flow"]
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -euo pipefail
        airflow_uid="$${AIRFLOW_UID:-50000}"
        mkdir -p /opt/airflow/logs /opt/airflow/plugins /opt/airflow/config
        chown -R "$${airflow_uid}:0" /opt/airflow/logs /opt/airflow/plugins /opt/airflow/config
        chmod -R g+rwX /opt/airflow/logs /opt/airflow/plugins /opt/airflow/config
        python -c 'import json, os; path = "/opt/airflow/config/passwords.json"; open(path, "w").write(json.dumps({os.environ["AIRFLOW_ADMIN_USER"]: os.environ["AIRFLOW_ADMIN_PASSWORD"]}) + "\n")'
        chown "$${airflow_uid}:0" /opt/airflow/config/passwords.json
        chmod 660 /opt/airflow/config/passwords.json
        su airflow -s /bin/bash -c 'airflow db migrate'
    environment: &airflow-prod-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_POSTGRES_PASSWORD}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__PARALLELISM: "2"
      AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: "2"
      AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: "1"
      AIRFLOW__SCHEDULER__PARSING_PROCESSES: "1"
      AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: "60"
      AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "120"
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: ${AIRFLOW_ADMIN_USER}:admin
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/config/passwords.json
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    volumes: &airflow-prod-volumes
      - ../../apps/flow/dags:/opt/airflow/dags:ro
      - airflow-logs:/opt/airflow/logs
      - airflow-plugins:/opt/airflow/plugins
      - airflow-config:/opt/airflow/config
    depends_on:
      postgres:
        condition: service_healthy
    user: "0:0"
    networks:
      - platform

  airflow-webserver:
    image: ${AIRFLOW_IMAGE:?AIRFLOW_IMAGE is required}
    container_name: platform-airflow-webserver
    profiles: ["flow"]
    command: api-server
    environment: *airflow-prod-env
    volumes: *airflow-prod-volumes
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 45s
    user: "${AIRFLOW_UID:-50000}:0"
    networks:
      - platform
    restart: unless-stopped

  airflow-scheduler:
    image: ${AIRFLOW_IMAGE:?AIRFLOW_IMAGE is required}
    container_name: platform-airflow-scheduler
    profiles: ["flow"]
    command: scheduler
    environment: *airflow-prod-env
    volumes: *airflow-prod-volumes
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 45s
    user: "${AIRFLOW_UID:-50000}:0"
    networks:
      - platform
    restart: unless-stopped

networks:
  platform:
    name: platform-prod
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
  postgres-data:
  airflow-logs:
  airflow-plugins:
  airflow-config:
  paperclip-data:
  raman-state:
