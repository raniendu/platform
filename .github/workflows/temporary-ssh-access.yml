name: Temporary SSH Access

on:
  workflow_dispatch:
    inputs:
      ssh_cidr:
        description: IPv4 /32 CIDR to allow for temporary SSH access.
        required: true
        type: string
      hold_minutes:
        description: Minutes to keep SSH open, from 1 to 30.
        required: true
        default: "10"
        type: string
      confirmation:
        description: Type open-temporary-ssh to confirm.
        required: true
        type: string

concurrency:
  group: temporary-ssh-access
  cancel-in-progress: false

jobs:
  temporary-ssh-access:
    name: Temporarily open SSH
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: production
    steps:
      - name: Set up doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Validate inputs
        env:
          SSH_CIDR: ${{ inputs.ssh_cidr }}
          HOLD_MINUTES: ${{ inputs.hold_minutes }}
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          set -euo pipefail

          if [ "$CONFIRMATION" != "open-temporary-ssh" ]; then
            echo "::error::confirmation must be open-temporary-ssh"
            exit 1
          fi

          if ! [[ "$SSH_CIDR" =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}/32$ ]]; then
            echo "::error::ssh_cidr must be a single IPv4 /32 CIDR."
            exit 1
          fi

          ip="${SSH_CIDR%/32}"
          IFS=. read -r a b c d <<< "$ip"
          for octet in "$a" "$b" "$c" "$d"; do
            if [ "$octet" -gt 255 ]; then
              echo "::error::ssh_cidr contains an invalid IPv4 octet."
              exit 1
            fi
          done

          if ! [[ "$HOLD_MINUTES" =~ ^[0-9]+$ ]] || [ "$HOLD_MINUTES" -lt 1 ] || [ "$HOLD_MINUTES" -gt 30 ]; then
            echo "::error::hold_minutes must be between 1 and 30."
            exit 1
          fi

          echo "SSH_CIDR=${SSH_CIDR}" >> "$GITHUB_ENV"
          echo "HOLD_SECONDS=$((HOLD_MINUTES * 60))" >> "$GITHUB_ENV"

      - name: Resolve firewall
        run: |
          set -euo pipefail

          firewall_id="$(
            doctl compute firewall list --format ID,Name --no-header |
              awk '$2 == "platform-shared-firewall" {print $1}'
          )"

          if [ -z "$firewall_id" ]; then
            echo "::error::platform-shared-firewall was not found."
            exit 1
          fi

          if [ "$(printf '%s\n' "$firewall_id" | wc -l)" -ne 1 ]; then
            echo "::error::Expected one platform-shared-firewall."
            printf '%s\n' "$firewall_id"
            exit 1
          fi

          echo "FIREWALL_ID=${firewall_id}" >> "$GITHUB_ENV"

      - name: Open SSH
        run: |
          set -euo pipefail

          doctl compute firewall remove-rules "$FIREWALL_ID" \
            --inbound-rules "protocol:tcp,ports:22,address:${SSH_CIDR}" >/dev/null 2>&1 || true
          doctl compute firewall add-rules "$FIREWALL_ID" \
            --inbound-rules "protocol:tcp,ports:22,address:${SSH_CIDR}"

      - name: Hold temporary access window
        run: sleep "$HOLD_SECONDS"

      - name: Close SSH
        if: always()
        run: |
          if [ -z "${FIREWALL_ID:-}" ] || [ -z "${SSH_CIDR:-}" ]; then
            echo "No temporary SSH rule recorded; skipping cleanup."
            exit 0
          fi

          doctl compute firewall remove-rules "$FIREWALL_ID" \
            --inbound-rules "protocol:tcp,ports:22,address:${SSH_CIDR}" || true
