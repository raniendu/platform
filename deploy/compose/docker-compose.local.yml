name: platform

services:
  caddy:
    image: caddy:2.8-alpine
    container_name: platform-caddy-local
    environment:
      PAPERCLIP_BASIC_AUTH_USER: ${PAPERCLIP_BASIC_AUTH_USER:-admin}
      PAPERCLIP_BASIC_AUTH_HASH: ${PAPERCLIP_BASIC_AUTH_HASH}
    ports:
      - "80:80"
    volumes:
      - ../caddy/Caddyfile.local:/etc/caddy/Caddyfile:ro
    depends_on:
      - dotdev
      - raman
      - homi
      - vikram
      - prefect-server
      - airflow-webserver
      - paperclip
    networks:
      - platform
    restart: unless-stopped

  dotdev:
    build:
      context: ../../apps/dotdev
      dockerfile: Dockerfile
    container_name: platform-dotdev-local
    ports:
      - "8501:8501"
    networks:
      - platform
    restart: unless-stopped

  raman:
    build:
      context: ../../apps/raman
      dockerfile: Dockerfile
    container_name: platform-raman-local
    environment:
      RAMAN_MODEL_PROVIDER: ${RAMAN_MODEL_PROVIDER:-ollama}
      RAMAN_DEV_MODEL: ${RAMAN_DEV_MODEL:-gemma4:26b}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      DO_INFERENCE_API_KEY: ${DO_INFERENCE_API_KEY:-}
      RAMAN_AGENT: ${RAMAN_AGENT:-raman}
      RAMAN_LOG_LEVEL: ${RAMAN_LOG_LEVEL:-INFO}
      RAMAN_OBSERVABILITY_ENABLED: ${RAMAN_OBSERVABILITY_ENABLED:-false}
      RAMAN_OBSERVABILITY_SERVICE_NAME: ${RAMAN_OBSERVABILITY_SERVICE_NAME:-raman}
      RAMAN_OTLP_ENDPOINT: ${RAMAN_OTLP_ENDPOINT:-http://jaeger:4318}
      RAMAN_OBSERVABILITY_CAPTURE_MESSAGE_CONTENT: ${RAMAN_OBSERVABILITY_CAPTURE_MESSAGE_CONTENT:-false}
      RAMAN_OBSERVABILITY_DISABLE_METRICS: ${RAMAN_OBSERVABILITY_DISABLE_METRICS:-false}
      RAMAN_OBSERVABILITY_DISABLED_INSTRUMENTORS: ${RAMAN_OBSERVABILITY_DISABLED_INSTRUMENTORS:-mistral}
      RAMAN_PUBLIC_BASE_URL: ${RAMAN_PUBLIC_BASE_URL:-http://raman.localhost}
      PARALLEL_API_KEY: ${PARALLEL_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS:-}
      ENVIRONMENT: local
    ports:
      - "8000:8000"
    volumes:
      - raman-state:/app/.raman
    networks:
      - platform
    restart: unless-stopped

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.17.0
    container_name: platform-jaeger-local
    ports:
      - "127.0.0.1:16686:16686"
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    networks:
      - platform
    restart: unless-stopped

  homi:
    build:
      context: ../../apps/homi
      dockerfile: Dockerfile
    container_name: platform-homi-local
    environment:
      HOMI_MODEL_ID: ${HOMI_MODEL_ID:-us.anthropic.claude-sonnet-4-20250514-v1:0}
      HOMI_AWS_REGION: ${HOMI_AWS_REGION:-us-west-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_BEARER_TOKEN_BEDROCK: ${AWS_BEARER_TOKEN_BEDROCK:-}
      HOMI_AGENT: ${HOMI_AGENT:-homi}
      HOMI_PUBLIC_BASE_URL: ${HOMI_PUBLIC_BASE_URL:-http://homi.localhost}
      HOMI_PARALLEL_API_KEY: ${HOMI_PARALLEL_API_KEY:-}
      PARALLEL_API_KEY: ${PARALLEL_API_KEY:-}
      HOMI_TELEGRAM_BOT_TOKEN: ${HOMI_TELEGRAM_BOT_TOKEN:-}
      HOMI_TELEGRAM_WEBHOOK_SECRET: ${HOMI_TELEGRAM_WEBHOOK_SECRET:-}
      HOMI_TELEGRAM_ALLOWED_CHAT_IDS: ${HOMI_TELEGRAM_ALLOWED_CHAT_IDS:-}
      ENVIRONMENT: local
    ports:
      - "8001:8000"
    volumes:
      - homi-state:/app/.homi
    networks:
      - platform
    restart: unless-stopped

  vikram:
    build:
      context: ../../apps/vikram
      dockerfile: Dockerfile
    container_name: platform-vikram-local
    environment:
      VIKRAM_MODEL: ${VIKRAM_MODEL:-gemini-flash-latest}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      VIKRAM_AGENT: ${VIKRAM_AGENT:-vikram}
      VIKRAM_PUBLIC_BASE_URL: ${VIKRAM_PUBLIC_BASE_URL:-http://vikram.localhost}
      VIKRAM_PARALLEL_API_KEY: ${VIKRAM_PARALLEL_API_KEY:-}
      PARALLEL_API_KEY: ${PARALLEL_API_KEY:-}
      VIKRAM_TELEGRAM_BOT_TOKEN: ${VIKRAM_TELEGRAM_BOT_TOKEN:-}
      VIKRAM_TELEGRAM_WEBHOOK_SECRET: ${VIKRAM_TELEGRAM_WEBHOOK_SECRET:-}
      VIKRAM_TELEGRAM_ALLOWED_CHAT_IDS: ${VIKRAM_TELEGRAM_ALLOWED_CHAT_IDS:-}
      ENVIRONMENT: local
    ports:
      - "8002:8000"
    volumes:
      - vikram-state:/app/.vikram
    networks:
      - platform
    restart: unless-stopped

  prefect-postgres:
    image: postgres:15-alpine
    container_name: platform-prefect-postgres-local
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: ${PREFECT_POSTGRES_PASSWORD:-prefect_local}
      POSTGRES_DB: prefect
    volumes:
      - prefect-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect -d prefect"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - platform
    restart: unless-stopped

  prefect-server:
    build:
      context: ../../apps/prefect
      dockerfile: Dockerfile
    container_name: platform-prefect-server-local
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:${PREFECT_POSTGRES_PASSWORD:-prefect_local}@prefect-postgres:5432/prefect
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_SERVER_API_PORT: 4200
      PREFECT_UI_URL: http://prefect.localhost
      PREFECT_API_URL: http://prefect.localhost/api
    ports:
      - "4200:4200"
    depends_on:
      prefect-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - platform
    restart: unless-stopped

  prefect-worker:
    build:
      context: ../../apps/prefect
      dockerfile: Dockerfile
    container_name: platform-prefect-worker-local
    command: /bin/bash /app/docker/prefect/start-worker.sh
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      WORK_POOL_NAME: ${PREFECT_WORK_POOL_NAME:-default-pool}
      WORK_POOL_TYPE: ${PREFECT_WORK_POOL_TYPE:-process}
      PUSHOVER_APP_TOKEN: ${PUSHOVER_APP_TOKEN:-}
      PUSHOVER_USER_KEY: ${PUSHOVER_USER_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ENVIRONMENT: local
    depends_on:
      prefect-server:
        condition: service_healthy
    networks:
      - platform
    restart: unless-stopped

  paperclip-postgres:
    image: postgres:15-alpine
    container_name: platform-paperclip-postgres-local
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: ${PAPERCLIP_POSTGRES_PASSWORD:-paperclip_local}
      POSTGRES_DB: paperclip
    volumes:
      - paperclip-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "paperclip", "-d", "paperclip"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - platform
    restart: unless-stopped

  paperclip:
    build:
      context: ../../apps/paperclip
      dockerfile: Dockerfile
    container_name: platform-paperclip-local
    environment:
      HOST: 0.0.0.0
      PORT: 3100
      SERVE_UI: "true"
      PAPERCLIP_HOME: /paperclip
      PAPERCLIP_INSTANCE_ID: default
      PAPERCLIP_CONFIG: /etc/paperclip/config.json
      PAPERCLIP_DEPLOYMENT_MODE: authenticated
      PAPERCLIP_DEPLOYMENT_EXPOSURE: private
      PAPERCLIP_PUBLIC_URL: http://paperclip.localhost
      PAPERCLIP_AUTH_PUBLIC_BASE_URL: http://paperclip.localhost
      PAPERCLIP_AUTH_BASE_URL_MODE: explicit
      PAPERCLIP_ALLOWED_HOSTNAMES: localhost,paperclip.localhost
      PAPERCLIP_MIGRATION_AUTO_APPLY: "true"
      PAPERCLIP_TELEMETRY_DISABLED: "1"
      DO_NOT_TRACK: "1"
      DATABASE_URL: postgresql://paperclip:${PAPERCLIP_POSTGRES_PASSWORD:-paperclip_local}@paperclip-postgres:5432/paperclip
      BETTER_AUTH_SECRET: ${PAPERCLIP_BETTER_AUTH_SECRET:-local_paperclip_better_auth_secret_change_me}
      PAPERCLIP_AGENT_JWT_SECRET: ${PAPERCLIP_AGENT_JWT_SECRET:-local_paperclip_agent_jwt_secret_change_me}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "3100:3100"
    volumes:
      - paperclip-data:/paperclip
      - ../paperclip/config.local.json:/etc/paperclip/config.json:ro
    depends_on:
      paperclip-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:3100/api/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - platform
    restart: unless-stopped

  airflow-postgres:
    image: postgres:15-alpine
    container_name: platform-airflow-postgres-local
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD:-airflow_local}
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - platform
    restart: unless-stopped

  airflow-init:
    build:
      context: ../../apps/flow
      dockerfile: Dockerfile
    container_name: platform-airflow-init-local
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -euo pipefail
        airflow_uid="$${AIRFLOW_UID:-50000}"
        mkdir -p /opt/airflow/logs /opt/airflow/plugins
        chown -R "$${airflow_uid}:0" /opt/airflow/logs /opt/airflow/plugins
        chmod -R g+rwX /opt/airflow/logs /opt/airflow/plugins
        su airflow -s /bin/bash -c 'airflow db migrate'
    environment: &airflow-local-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_POSTGRES_PASSWORD:-airflow_local}@airflow-postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "true"
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-local_airflow_secret_key_change_me}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-local_airflow_secret_key_change_me}
    volumes: &airflow-local-volumes
      - ../../apps/flow/dags:/opt/airflow/dags:ro
      - airflow-logs:/opt/airflow/logs
      - airflow-plugins:/opt/airflow/plugins
    depends_on:
      airflow-postgres:
        condition: service_healthy
    user: "0:0"
    networks:
      - platform

  airflow-webserver:
    build:
      context: ../../apps/flow
      dockerfile: Dockerfile
    container_name: platform-airflow-webserver-local
    command: api-server
    environment: *airflow-local-env
    volumes: *airflow-local-volumes
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 45s
    user: "${AIRFLOW_UID:-50000}:0"
    networks:
      - platform
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: ../../apps/flow
      dockerfile: Dockerfile
    container_name: platform-airflow-scheduler-local
    command: scheduler
    environment: *airflow-local-env
    volumes: *airflow-local-volumes
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 45s
    user: "${AIRFLOW_UID:-50000}:0"
    networks:
      - platform
    restart: unless-stopped

networks:
  platform:
    name: platform-local
    driver: bridge

volumes:
  prefect-postgres-data:
  airflow-postgres-data:
  airflow-logs:
  airflow-plugins:
  paperclip-postgres-data:
  paperclip-data:
  raman-state:
  homi-state:
  vikram-state:
